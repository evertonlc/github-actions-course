name: 04 - Using Actions
on:
    workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm ci
        working-directory: 04-using-actions/react-app
      - name: Run unit tests
        run: npm run test
        working-directory: 04-using-actions/react-app