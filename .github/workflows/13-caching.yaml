name: 13 - Using Caching

on:
  workflow_dispatch:
    inputs:
      use-cache:
        type: boolean
        description: "Whether to execute the cache step"
        default: true
      node-version:
        type: choice
        description: "Node version to use"
        options:
          - '18.x'
          - '20.x'
          - '21.x'
        default: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # This working directory apply only to run commands, not to actions
        working-directory: 13-caching/react-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with: 
          node-version: ${{ github.event.inputs.node-version }}
      - name: Download cache dependencies
        if: ${{ github.event.inputs.use-cache }}
        id: cache
        uses: actions/cache@v5
        with:
          path: 13-caching/react-app/node_modules
          key: deps-node-modules-${{ hashFiles('13-caching/react-app/package-lock.json') }}
      - name: Install dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci
      - name: Testing
        run: npm run test
      - name: Build
        run: npm run build
      - name: Deploy to nonprod
        run: echo "Deploying to nonprod environment"
