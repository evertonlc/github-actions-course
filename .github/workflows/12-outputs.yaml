name: 12 - Working with Outputs

on:
  workflow_dispatch:
    inputs:
      build-status:
        type: choice
        description: "Simulate build status"
        options:
          - success
          - failure

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ steps.build.outputs.status }}
      output1: ${{ steps.build.outputs.output1 }}
      output2: value2
    steps:
      - name: Print GITHUB_OUTPUT path
        run: |
          echo "GITHUB_OUTPUT is set to: $GITHUB_OUTPUT"
      - name: Build
        id: build
        # This will first echo will print a different output file from the first step
        run: |
          echo "GITHUB_OUTPUT is set to: $GITHUB_OUTPUT"
          echo "status=${{ inputs.build-status }}" >> $GITHUB_OUTPUT
          cat "$GITHUB_OUTPUT"
          echo "output1=output1" >> $GITHUB_OUTPUT
          echo "mistake=true" >> $GITHUB_OUTPUT
          cat "$GITHUB_OUTPUT"
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.outputs.build-status == 'success' }}
    steps:
      - name: Deploy
        run: echo "Deploying"
      - name: Print Outputs
        run: |
          echo "Build Status: ${{ needs.build.outputs.build-status }}"
          echo "Build Status: ${{ needs.build.outputs.output1 }}"