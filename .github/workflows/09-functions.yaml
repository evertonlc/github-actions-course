# Ref:
# https://docs.github.com/en/actions/reference/workflows-and-actions/expressions#functions
name: 09 - Using Functions

on:
  pull_request:
  workflow_dispatch:

jobs:
  echo1:
    runs-on: ubuntu-latest
    steps:
      - name: Failing step
        run: exit 1
      - name: I will be skipped.
        if: success()
        run: echo I will print if the previous steps succeed.
      - name: I will execute
        if: failure()
        run: echo I will print if any of the previous steps fails.
      - name: I will execute
        if: ${{ !cancelled() }}
        run: echo I will always print, except when the workflow is cancelled.
      - name: I will execute when cancelled
        if: cancelled()
        run: echo I will print only when the workflow is cancelled.
      