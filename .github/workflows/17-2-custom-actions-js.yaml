name: 17 - 2 - Custom Actions - JS

on: 
  workflow_dispatch:
    inputs:
      base-branch:
        description: "The branch used as the base for the dependency update checks"
        default: "main"
        required: false
      target-branch:
        description: "The branch from which the PR is created"
        default: "update-dependencies"
        required: false
      working-dir:
        description: "The working directory of the project to check for dependency updates"
        required: true
      debug:
        description: "Whether to output debug messages to the console"
        required: false

run-name: "Run 17 - 2 - Custom Actions - JS | Base Branch: ${{ github.event.inputs.base-branch }} | Target Branch: ${{ github.event.inputs.target-branch }} | Working Directory: ${{ github.event.inputs.working-dir }}"

jobs:
  dependency-update:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3
      - name: "Check for dependency updates"
        uses: ./.github/actions/js-dependency-update
        with:
          base-branch: ${{ github.event.inputs.base-branch }}
          target-branch: ${{ github.event.inputs.target-branch }}
          working-directory: ${{ github.event.inputs.working-dir }}
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          debug: ${{ github.event.inputs.debug }}