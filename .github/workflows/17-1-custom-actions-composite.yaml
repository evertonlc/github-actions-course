name: 17 - 1 - Custom Actions - Composite

on:
  workflow_dispatch:
    inputs:
      target-env:
        type: choice
        default: dev
        options:
          - dev
          - prod

run-name: 17 - 1 - Custom Actions - Composite | env ${{ github.event.inputs.target-env }}

env:
  working-directory: 17-custom-actions/react-app

jobs:
  build:
    defaults:
      run:
        working-directory: ${{ env.working-directory }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node and NPM dependencies
        id: setup-deps
        uses: ./.github/actions/composite-cache-deps
        with:
          node-version: '20.x'
          working-dir: ${{ env.working-directory }}
          target-env: ${{ github.event.inputs.target-env }}
      - name: Print setup deps output
        run: |
          echo "Installed dependencies: ${{ steps.setup-deps.outputs.installed-deps }}"
      - name: Run unit tests
        run: npm run test
      - name: Run build
        run: npm run build